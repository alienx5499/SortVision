# Typos (spell checker) — used by .github/workflows/typos.yml
# Excludes multilingual/localization and generated/vendor-heavy files where
# English spell-check rules generate noisy false positives.

[files]
extend-exclude = [
  "SortVision/pnpm-lock.yaml",
  "SortVision/public/**",
  "SortVision/src/locales/**",
  "SortVision/src/context/LanguageContext.jsx",
  "SortVision/src/components/chatbot/ChatAssistant.jsx",
  "SortVision/src/components/chatbot/assistantEngine/templates/localizedHelp.js",
  "SortVision/src/utils/seo.js",
  "SortVision/src/utils/seo/data.js",
  "SortVision/src/utils/seo/meta.js",
  "**/*.min.js",
]

[default]
extend-ignore-re = [
  "(?i)sortvision",
  "(?i)dsa",
  "(?i)href",
  "(?i)webp",
  "(?i)vercel",
  "(?i)radix",
  "(?i)tailwind",
]

[default.extend-words]
Algorithmus = "Algorithmus"
DAA = "DAA"
