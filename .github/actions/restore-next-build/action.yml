name: Restore Next.js build from CI artifact
description: >
  Downloads the next-build tarball from the Build job and extracts it to SortVision/.next.
  Use after checkout + setup-sortvision on parallel consumer jobs.

inputs:
  artifact-name:
    description: Artifact name produced by the Build job
    required: false
    default: next-build

runs:
  using: composite
  steps:
    - name: Download Next.js build tarball
      uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}

    - name: Extract and verify Next.js production build
      shell: bash
      run: |
        set -euo pipefail
        TARBALL="${RUNNER_TEMP}/next-build.tar.gz"
        if [ ! -f "$TARBALL" ]; then
          echo "::error::Missing next-build tarball after download"
          ls -la "${RUNNER_TEMP}" || true
          exit 1
        fi
        tar xzf "$TARBALL" -C "${GITHUB_WORKSPACE}/SortVision"
        if [ ! -f "${GITHUB_WORKSPACE}/SortVision/.next/BUILD_ID" ]; then
          echo "::error::SortVision/.next/BUILD_ID missing after extract"
          ls -la "${GITHUB_WORKSPACE}/SortVision/.next" 2>/dev/null || echo "no .next directory"
          exit 1
        fi
        echo "Restored Next.js build id: $(tr -d '\n' < "${GITHUB_WORKSPACE}/SortVision/.next/BUILD_ID")"
