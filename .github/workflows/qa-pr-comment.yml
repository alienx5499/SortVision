# Posts a sticky PR comment with QA suite summary (artifact from "Build and test").
# Same pattern as workflow_run + artifact + find/create comment; do not add as a required check.

name: QA PR comment

on:
  workflow_run:
    workflows: ['Continuous integration']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  post-qa-report:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      # Build and test may not run (e.g. lint/format failed), so no artifact — avoid download error noise.
      - name: Check for qa-pr-comment artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"
          COUNT=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[]? | select(.name == "qa-pr-comment")] | length')
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No qa-pr-comment artifact (Build and test skipped or did not upload). Skipping."
          fi

      - name: Download QA comment artifact
        id: download
        if: steps.artifact.outputs.found == 'true'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: qa-pr-comment
          path: downloaded-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR number
        id: pr
        if: steps.artifact.outputs.found == 'true' && steps.download.outcome == 'success'
        run: |
          set -euo pipefail
          if [ ! -f downloaded-results/pr_number.txt ] || [ ! -f downloaded-results/comment.md ]; then
            echo "Missing pr_number.txt or comment.md; skipping."
            exit 1
          fi
          echo "number=$(tr -d '[:space:]' < downloaded-results/pr_number.txt)" >> "$GITHUB_OUTPUT"

      - name: Find previous QA comment
        id: find
        if: steps.artifact.outputs.found == 'true' && steps.download.outcome == 'success' && steps.pr.outcome == 'success'
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body-includes: '<!-- sortvision-qa-report -->'

      - name: Create or update PR comment
        if: steps.artifact.outputs.found == 'true' && steps.download.outcome == 'success' && steps.pr.outcome == 'success'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          body-path: downloaded-results/comment.md
          edit-mode: replace
