name: Extended quality assurance

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '24'
  NEXT_PUBLIC_SITE_URL: https://www.sortvision.com

defaults:
  run:
    working-directory: ./SortVision

jobs:
  extended-quality-assurance:
    name: Extended QA (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Next.js build
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: SortVision/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('SortVision/pnpm-lock.yaml', 'SortVision/package.json') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Setup SortVision
        uses: ./.github/actions/setup-sortvision
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prettier (check)
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Start development server
        run: |
          pnpm run dev &
          echo $! > .server-pid
          npx wait-on http://localhost:3000 --timeout 180000
          sleep 10

      - name: Run extended test suite (1000+ tests)
        run: pnpm run test:extended
        env:
          CI: 'true'
          GITHUB_ACTIONS: 'true'

      - name: Stop server
        if: always()
        run: |
          if [ -f .server-pid ]; then
            kill $(cat .server-pid) 2>/dev/null || true
            rm .server-pid
          fi

      - name: Generate and validate sitemap
        run: |
          pnpm run generate-sitemap
          if [ ! -f public/sitemap.xml ]; then
            echo "ERROR: Sitemap generation failed"
            exit 1
          fi
          echo "Sitemap generated: $(wc -l < public/sitemap.xml) lines"

      - name: Audit production dependencies (high/critical fail the step)
        run: pnpm audit --production --audit-level=high

      - name: Write audit JSON for artifact
        if: always()
        run: (pnpm audit --production --json > audit-results.json) || echo '{"error":"audit_failed"}' > audit-results.json

      - name: Analyze bundle size
        run: |
          echo "=== Bundle Size Analysis ==="
          du -sh .next/static/chunks/* 2>/dev/null | sort -h | tail -10 || echo "No chunks found"
          TOTAL_SIZE=$(du -sb .next 2>/dev/null | awk '{print $1}')
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total build size: ${TOTAL_SIZE_MB}MB"
          if [ $TOTAL_SIZE_MB -gt 50 ]; then
            echo "WARNING: Build size exceeds 50MB"
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -f .server-pid ]; then
            kill $(cat .server-pid) 2>/dev/null || true
            rm .server-pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: test-results
          path: |
            SortVision/test-results-*.json
            SortVision/*.log
            SortVision/audit-results.json
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          echo "## Extended QA Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format / Lint | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Extended suite | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO / sitemap | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Security audit | See job log / artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle analysis | Completed |" >> $GITHUB_STEP_SUMMARY
